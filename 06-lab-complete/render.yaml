services:
  - type: web
    name: production-ai-agent
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: AGENT_API_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          property: connectionString
  - type: redis
    name: agent-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
